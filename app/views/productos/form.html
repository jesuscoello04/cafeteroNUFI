{% extends 'base.html' %}
{% block title %}{{ 'Editar' if producto else 'Nuevo' }} Producto · El Cafetero de Nufi{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('productos.listar') }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0">
                {{ 'Editar Producto' if producto else 'Nuevo Producto' }}
            </h3>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" name="nombre" class="form-control"
                            value="{{ producto.nombre if producto else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3"
                                placeholder="Descripción del producto (opcional)">{{ producto.descripcion if producto else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Precio Unitario</label>
                        <input type="number" name="precio_unitario" class="form-control"
                            step="0.01" min="0"
                            value="{{ producto.precio_unitario if producto else '' }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Unidad de Medida</label>
                        <input type="text" name="unidad_medida" class="form-control"
                            placeholder="kg, bulto, arroba, unidades..."
                            value="{{ producto.unidad_medida if producto else '' }}" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg"></i>
                            {{ 'Guardar cambios' if producto else 'Registrar producto' }}
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
